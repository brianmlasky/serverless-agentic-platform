---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: litellm-sa
  namespace: agentic
  annotations:
    iam.gke.io/gcp-service-account: litellm-sa@alert-hall-466720-c0.iam.gserviceaccount.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: agentic
data:
  config.yaml: |
    model_list:
      - model_name: claude-haiku
        litellm_params:
          model: vertex_ai/us.anthropic.claude-haiku-4-5-20251001-v1:0
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1

      - model_name: claude-sonnet
        litellm_params:
          model: vertex_ai/us.anthropic.claude-sonnet-4-5-20250929-v1:0
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1

      - model_name: claude-opus
        litellm_params:
          model: vertex_ai/us.anthropic.claude-opus-4-5-20251101-v1:0
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1

    litellm_settings:
      drop_params: true
      request_timeout: 600

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      database_url: os.environ/DATABASE_URL
      store_model_in_db: true
      budget_duration: 30d
      max_budget: 50
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-gateway
  namespace: agentic
  labels:
    app: litellm-gateway
spec:
  selector:
    app: litellm-gateway
  ports:
    - name: http
      port: 80
      targetPort: 4000
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-gateway
  namespace: agentic
  labels:
    app: litellm-gateway
    version: v1.83.3-stable.patch.4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-gateway
  template:
    metadata:
      labels:
        app: litellm-gateway
        version: v1.83.3-stable.patch.4
    spec:
      serviceAccountName: litellm-sa
      containers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
          args:
            - "alert-hall-466720-c0:us-central1:litellm-db"
            - "--address=127.0.0.1"
            - "--port=5432"
            - "--private-ip"
            - "--health-check"
            - "--http-address=0.0.0.0"
            - "--http-port=9090"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "200m"
              memory: "128Mi"
              ephemeral-storage: "1Gi"
          readinessProbe:
            httpGet:
              path: /readiness
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

        - name: litellm
          image: us-central1-docker.pkg.dev/alert-hall-466720-c0/dev-repo/litellm:v1.83.3-stable.patch.4
          args:
            - "--config"
            - "/app/config.yaml"
            - "--port"
            - "4000"
            - "--detailed_debug"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-master-key
                  key: master-key
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database
            - name: DATABASE_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@127.0.0.1:5432/$(DB_NAME)"
            - name: STORE_MODEL_IN_DB
              value: "true"
            - name: GOOGLE_CLOUD_PROJECT
              value: "alert-hall-466720-c0"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
              ephemeral-storage: "1Gi"
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          startupProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
            timeoutSeconds: 10
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

      volumes:
        - name: litellm-config
          configMap:
            name: litellm-config
