apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: api-gateway-backend
  namespace: agentic
  labels:
    app: api-gateway
    component: ingress
    managed-by: gke-ingress
spec:
  timeoutSec: 300
  connectionDraining:
    drainingTimeoutSec: 60
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /health
    port: 80
  sessionAffinity:
    affinityType: "NONE"
