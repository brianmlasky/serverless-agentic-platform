apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: agentic
  labels:
    app: api-gateway
    environment: dev
    cost-center: agent-logic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        environment: dev
        cost-center: agent-logic
    spec:
      serviceAccountName: api-gateway-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api-gateway
          image: us-central1-docker.pkg.dev/alert-hall-466720-c0/agentic-platform/api-gateway:v2.0.0@sha256:aa83210813115b30b3adfcf72cdb93683a4547f1a4d263cd57da04ebf20e4996
          ports:
            - containerPort: 8080
          env:
            - name: LITELLM_BASE_URL
              value: "http://litellm-gateway.litellm.svc.cluster.local:80"
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-master-key
                  key: master-key
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: agentic
  labels:
    environment: dev
    cost-center: agent-logic
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway-sa
  namespace: agentic
  labels:
    environment: dev
    cost-center: agent-logic
  annotations:
    iam.gke.io/gcp-service-account: api-gateway@alert-hall-466720-c0.iam.gserviceaccount.com
