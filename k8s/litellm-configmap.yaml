apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
data:
  config.yaml: |
    model_list:
      # ── AWS Bedrock: Amazon Nova (cross-region inference profiles, us-east-1) ─
      # Confirmed working via direct invocation 2025-05-11
      - model_name: bedrock-nova-premier
        litellm_params:
          model: bedrock/us.amazon.nova-premier-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-nova-pro
        litellm_params:
          model: bedrock/us.amazon.nova-pro-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-nova-lite
        litellm_params:
          model: bedrock/us.amazon.nova-lite-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-nova-micro
        litellm_params:
          model: bedrock/us.amazon.nova-micro-v1:0
          aws_region_name: us-east-1

      # ── AWS Bedrock: DeepSeek R1 (Marketplace, confirmed working) ─────────────
      - model_name: bedrock-deepseek-r1
        litellm_params:
          model: bedrock/us.deepseek.r1-v1:0
          aws_region_name: us-east-1

      # ── AWS Bedrock: Meta Llama (no marketplace approval needed) ──────────────
      - model_name: bedrock-llama-3b
        litellm_params:
          model: bedrock/us.meta.llama3-2-3b-instruct-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-llama-8b
        litellm_params:
          model: bedrock/us.meta.llama3-1-8b-instruct-v1:0
          aws_region_name: us-east-1

      # ── AWS Bedrock: Anthropic Claude (pending use-case approval) ─────────────
      # ACCESS BLOCKED: Submit use-case details in AWS Console → Bedrock →
      # Model access → Anthropic section before these will work.
      - model_name: bedrock-claude-haiku
        litellm_params:
          model: bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-claude-sonnet
        litellm_params:
          model: bedrock/us.anthropic.claude-3-5-sonnet-20241022-v2:0
          aws_region_name: us-east-1

      # ── GCP Vertex AI / Gemini (pending ToS acceptance in GCP Console) ────────
      # ACTION NEEDED: Accept Vertex AI Terms of Service at
      # console.cloud.google.com/vertex-ai → project alert-hall-466720-c0
      - model_name: gemini-flash
        litellm_params:
          model: vertex_ai/gemini-2.0-flash-001
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1

      - model_name: gemini-pro
        litellm_params:
          model: vertex_ai/gemini-2.5-pro-preview-05-06
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1

    litellm_settings:
      drop_params: true
      request_timeout: 600
      success_callback: []
      failure_callback: []

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
