apiVersion: v1
data:
  config.yaml: |
    model_list:
      # ── AWS Bedrock: Anthropic (via cross-region inference profiles) ───────────
      - model_name: bedrock-claude-haiku
        litellm_params:
          model: bedrock/us.anthropic.claude-3-5-haiku-20241022-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-claude-haiku-4
        litellm_params:
          model: bedrock/anthropic.claude-haiku-4-5-20251001-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-claude-sonnet
        litellm_params:
          model: bedrock/us.anthropic.claude-opus-4-20250514-v1:0
          aws_region_name: us-east-1

      # ── AWS Bedrock: Amazon Nova ───────────────────────────────────────────────
      - model_name: bedrock-nova-premier
        litellm_params:
          model: bedrock/us.amazon.nova-premier-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-nova-pro
        litellm_params:
          model: bedrock/amazon.nova-pro-v1:0
          aws_region_name: us-east-1

      # ── AWS Bedrock: Meta Llama (typically no marketplace approval needed) ─────
      - model_name: bedrock-llama-3b
        litellm_params:
          model: bedrock/us.meta.llama3-2-3b-instruct-v1:0
          aws_region_name: us-east-1

      - model_name: bedrock-llama-8b
        litellm_params:
          model: bedrock/us.meta.llama3-1-8b-instruct-v1:0
          aws_region_name: us-east-1

      # ── GCP Vertex AI / Gemini ─────────────────────────────────────────────────
      - model_name: gemini-flash
        litellm_params:
          model: vertex_ai/gemini-2.0-flash-001
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1

      - model_name: gemini-pro
        litellm_params:
          model: vertex_ai/gemini-2.5-pro-preview-05-06
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1

    litellm_settings:
      drop_params: true
      request_timeout: 600
      success_callback: []
      failure_callback: []

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
