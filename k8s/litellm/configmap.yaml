apiVersion: v1
data:
  config.yaml: |
    model_list:

      # ── Gemini 2.5 Flash ──────────────────────────────────────────────────────
      - model_name: gemini-flash
        litellm_params:
          model: vertex_ai/gemini-2.5-flash
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1

      - model_name: gemini-flash-eu
        litellm_params:
          model: vertex_ai/gemini-2.5-flash
          vertex_project: alert-hall-466720-c0
          vertex_location: europe-west1

      # ── Gemini 2.5 Pro — thinking model needs budget headroom ────────────────
      - model_name: gemini-pro
        litellm_params:
          model: vertex_ai/gemini-2.5-pro
          vertex_project: alert-hall-466720-c0
          vertex_location: us-central1
          thinking:
            type: enabled
            budget_tokens: 2048   # explicit thinking budget; response tokens on top

    litellm_settings:
      drop_params: true
      request_timeout: 120        # pro is slower; was 60
      num_retries: 3

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
kind: ConfigMap
