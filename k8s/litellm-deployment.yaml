apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: litellm-gateway
    cost-center: research-dev
  name: litellm-gateway
  namespace: litellm
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: litellm-gateway
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      annotations: {}
      labels:
        app: litellm-gateway
        cost-center: research-dev
    spec:
      containers:
      - args:
        - --config
        - /app/config/config.yaml
        env:
        - name: AWS_ROLE_ARN
          value: arn:aws:iam::229502947368:role/dev-litellm-bedrock-role
        - name: AWS_WEB_IDENTITY_TOKEN_FILE
          value: /var/run/secrets/tokens/aws-token
        - name: AWS_DEFAULT_REGION
          value: us-east-1
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              key: master-key
              name: litellm-master-key
        image: ghcr.io/berriai/litellm:main-latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health/liveliness
            port: 4000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        name: litellm
        ports:
        - containerPort: 4000
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /health/readiness
            port: 4000
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: '1'
            ephemeral-storage: 1Gi
            memory: 2Gi
          requests:
            cpu: 250m
            ephemeral-storage: 1Gi
            memory: 1200Mi
        securityContext:
          capabilities:
            drop:
            - NET_RAW
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /app/config
          name: config-volume
        - mountPath: /var/run/secrets/tokens
          name: aws-token
          readOnly: true
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccount: litellm-sa
      serviceAccountName: litellm-sa
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: kubernetes.io/arch
        operator: Equal
        value: amd64
      volumes:
      - configMap:
          defaultMode: 420
          name: litellm-config
        name: config-volume
      - name: aws-token
        projected:
          defaultMode: 420
          sources:
          - serviceAccountToken:
              audience: sts.amazonaws.com
              expirationSeconds: 3600
              path: aws-token
