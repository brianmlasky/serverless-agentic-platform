name: Deploy to GKE

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
      - '!k8s/api-gateway-deployment.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy LiteLLM to GKE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud via WIF
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_LOCATION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Verify cluster connection
        run: |
          echo "=== Cluster Info ==="
          kubectl cluster-info
          echo "=== Current context ==="
          kubectl config current-context

      - name: Apply Kubernetes manifests
        run: |
          echo "=== Applying namespace ==="
          kubectl apply -f k8s/namespace.yaml
          echo "=== Applying configmap ==="
          kubectl apply -f k8s/configmap.yaml
          echo "=== Applying deployment ==="
          kubectl apply -f k8s/deployment.yaml
          echo "=== Applying service ==="
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/litellm \
            --namespace=litellm \
            --timeout=300s

      - name: Verify deployment health
        run: |
          echo "=== Pod status ==="
          kubectl get pods --namespace=litellm --selector=app=litellm -o wide
          echo "=== Replicas ready ==="
          kubectl get deployment litellm --namespace=litellm \
            -o jsonpath='{.status.readyReplicas}/{.spec.replicas} replicas ready'
          echo ""
          echo "=== Recent events ==="
          kubectl get events --namespace=litellm --sort-by='.lastTimestamp' | tail -10
