name: Demo Platform Lifecycle

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: 'Type DESTROY to confirm teardown'
        required: false
        type: string

concurrency:
  group: demo-lifecycle
  cancel-in-progress: false

jobs:
  lifecycle:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for BOTH GCP and AWS OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Guard — Require DESTROY confirmation
        if: inputs.action == 'destroy'
        run: |
          if [[ "${{ inputs.confirm_destroy }}" != "DESTROY" ]]; then
            echo "❌ ERROR: You must type DESTROY to confirm teardown"
            exit 1
          fi
          echo "✅ Destroy confirmed"

      # ── GCP Authentication ─────────────────────────────────────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3.0.1

      - name: Verify GCP Identity
        run: |
          echo "=== Active Account ==="
          gcloud auth list
          echo "=== Project ==="
          gcloud config get-value project

      # ── AWS Authentication ─────────────────────────────────────────
      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.1
        with:
          role-to-assume: arn:aws:iam::229502947368:role/github-actions-terraform-role
          aws-region: us-east-1
          audience: sts.amazonaws.com
          role-session-name: GitHubActions-Terraform

      - name: Verify AWS Identity
        run: |
          echo "=== AWS Caller Identity ==="
          aws sts get-caller-identity

      # ── Terraform ──────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Terraform Init
        working-directory: ./terraform/environments/dev-aws
        run: terraform init

      - name: Terraform Plan
        if: inputs.action == 'plan' || inputs.action == 'apply'
        working-directory: ./terraform/environments/dev-aws
        run: |
          terraform plan \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="gcp_region=us-central1" \
            -var="gke_cluster_name=dev-gke-cluster" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="admin_user_name=${{ secrets.AWS_ADMIN_USER_NAME }}" \
            -out=tfplan

      - name: Terraform Apply
        if: inputs.action == 'apply'
        working-directory: ./terraform/environments/dev-aws
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: inputs.action == 'destroy'
        working-directory: ./terraform/environments/dev-aws
        run: |
          terraform destroy -auto-approve \
            -var="gcp_project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="gcp_region=us-central1" \
            -var="gke_cluster_name=dev-gke-cluster" \
            -var="aws_account_id=${{ secrets.AWS_ACCOUNT_ID }}" \
            -var="admin_user_name=${{ secrets.AWS_ADMIN_USER_NAME }}"
