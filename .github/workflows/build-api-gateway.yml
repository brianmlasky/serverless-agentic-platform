name: Build & Deploy — api-gateway

on:
  push:
    branches: [main]
    paths:
      - "services/api-gateway/**"
      - "k8s/api-gateway-deployment.yaml"
      - ".github/workflows/build-api-gateway.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override image tag (default: v<sha>)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: us-central1-docker.pkg.dev
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REPO: agentic-platform
  IMAGE: api-gateway
  NAMESPACE: agentic

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Derive image tag
        id: meta
        run: |
          if [[ -n "${{ github.event.inputs.image_tag }}" ]]; then
            TAG="${{ github.event.inputs.image_tag }}"
          else
            BASE=$(cat services/api-gateway/VERSION 2>/dev/null || echo "2.1.0")
            TAG="v${BASE}-${GITHUB_SHA::7}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: ${TAG}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/api-gateway
          file: services/api-gateway/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:latest

  deploy:
    name: Deploy to GKE (agentic)
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: write
      id-token: write

    env:
      IMAGE_TAG: ${{ needs.build-push.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GKE_CLUSTER_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Patch manifest image tag and version labels
        run: |
          FULL_IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ env.IMAGE_TAG }}"
          sed -i "s|image: .*/api-gateway:.*|image: ${FULL_IMAGE}|" k8s/api-gateway-deployment.yaml
          sed -i "s|version: v[0-9.]*[^ ]*|version: ${{ env.IMAGE_TAG }}|g" k8s/api-gateway-deployment.yaml
          sed -i "s|value: \"v[0-9][^\"]*/|value: \"${{ env.IMAGE_TAG }}\"|" k8s/api-gateway-deployment.yaml
          grep -E "image:|version:|APP_VERSION" k8s/api-gateway-deployment.yaml

      - name: Apply manifest
        run: kubectl apply -f k8s/api-gateway-deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/api-gateway \
            -n ${{ env.NAMESPACE }} --timeout=300s

      - name: Smoke test
        run: |
          kubectl port-forward -n ${{ env.NAMESPACE }} \
            deployment/api-gateway 18080:8080 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null" EXIT
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:18080/health || true)
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt ${i}/12 — got ${STATUS}, retrying in 5s"
            sleep 5
          done
          echo "Smoke test failed — rolling back"
          kubectl rollout undo deployment/api-gateway -n ${{ env.NAMESPACE }}
          exit 1

      - name: Commit manifest update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/api-gateway-deployment.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(api-gateway): bump image to ${{ env.IMAGE_TAG }} [skip ci]"
          git pull --rebase origin main
          git push
